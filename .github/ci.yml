name: CI - NestJS Backend Validations

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-code:
    name: Revising Linter and Build
    runs-on: ubuntu-latest

    steps:
      - name: Obtener codigo fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Revisar formato (Prettier - No bloquea si falla)
        run: npm run format --if-present
        continue-on-error: true

      - name: Ejecutar Linter (ESLint)
        run: npm run lint

      - name: Compilar aplicacion (Build)
        run: npm run build